name: CI/CD - Deploy Node Backend to Azure

on:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: prepvio-adminbackend
  NODE_VERSION: '20.x'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # Add any env vars your tests need here
          # DB_URL: ${{ secrets.DB_URL }}

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test  # Blocks deploy if tests fail

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Zip build output
        run: zip -r app.zip . -x "*.git*" -x "node_modules/*" -x "*.env*" -x "src/*" -x "*.test.*" -x "*.spec.*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip

      - name: Inject environment variables into Azure
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --settings \
                NODE_ENV=production \
                DB_URL="${{ secrets.DB_URL }}" \
                JWT_SECRET="${{ secrets.JWT_SECRET }}"
                # Add every env var your app needs here
